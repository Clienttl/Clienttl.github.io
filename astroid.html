<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>about:blank</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Poppins', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        .a {
            text-align: center;
        }
        .b {
            background-color: #333;
            color: white;
            font-size: 20px;
            padding: 15px 30px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .b:hover {
            background-color: #555;
        }
        .notice {
            margin-top: 20px;
            font-size: 16px;
            color: #ff0000;
        }
    </style>
</head>
<body>
    <div class="a">
        <button class="b" onclick="openLinks()">generate links</button>
        <p class="notice">If ALL links do not open, please allow popups in chrome [top right of search bar]</p>
    </div>
    <script>
        function openLinks() {
            var links = [
                'https://aha.teachingworksheets.org',
                'https://ah3.teachingworksheets.org',
                'https://wdwl.teachingworksheets.org',
                'https://d12y1928d.teachingworksheets.org',
                'https://dqwuhd1.teachingworksheets.org'
            ];

            links.forEach(function(link) {
                var newWindow = window.open(link, '_blank');
                if (newWindow) newWindow.focus();
            });
        }
    </script>
</body>
</html>
