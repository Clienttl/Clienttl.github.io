<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f0f0f0;
        }
        canvas {
            display: block;
            background-color: #f0f0f0;
        }
        #info {
            position: fixed;
            top: 10px;
            left: 10px;
            font-size: 20px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="info">
        Pops: <span id="popCount">0</span> | Lives: <span id="lives">1</span><br>
        Cooldown: <span id="cooldown">0</span>s
    </div>
    <canvas id="gameCanvas"></canvas>
    <script src="game.js"></script>
</body>
</html>
