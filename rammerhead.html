<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>about:blank</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Poppins', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .a {
            text-align: center;
        }
        .b {
            background-color: #333;
            color: white;
            font-size: 20px;
            padding: 15px 30px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .b:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <div class="a">
        <button class="b" onclick="c()">generate link updated 1/15/25</button>
    </div>
    <script>
        function c() {
            var d = [
                'https://mathlover.safira.com.my/',
                'https://thisforcinco.larrondoinstalaciones.cl/',
                'https://math.for.kids22.7s.com.tr/',
                'https://wozers.glup.sk/',
                'https://education-lesson-pre-algebra-lesson68.eduarmor.com/'
            ];

            d.forEach(function(e) {
                var newWindow = window.open(e, '_blank');
                if (newWindow) newWindow.focus();
            });
        }
    </script>
</body>
</html>
